project_name: port-client

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/port-client
    binary: port
    ldflags:
      - -s -w -X github.com/eslusarenko/port-client/internal/version.Version={{.Version}}

archives:
  - formats: ['tar.gz']
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats: ['zip']

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  groups:
    - title: 'Features'
      regexp: '^.*?feat(\([^\)]+\))?!?:'
      order: 0
    - title: 'Bug fixes'
      regexp: '^.*?fix(\([^\)]+\))?!?:'
      order: 1
    - title: 'Other'
      order: 999
